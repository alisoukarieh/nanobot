x-nanobot-build: &nanobot-build
  context: .
  dockerfile: Dockerfile

services:
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    restart: unless-stopped
    volumes:
      - pb-data:/pb_data

  nanobot:
    build: *nanobot-build
    image: nanobot:latest
    restart: unless-stopped
    user: "0:0"
    working_dir: /app
    depends_on:
      - pocketbase
    volumes:
      - nanobot-data:/home/nanobot/.nanobot
    environment:
      HOME: /home/nanobot
      XDG_CONFIG_HOME: /home/nanobot/.nanobot/config
      DASHBOARD_INTERNAL_URL: http://dashboard:3000
      OAUTH_CLI_KIT_TOKEN_PATH: /home/nanobot/.nanobot/auth/github-copilot.json
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      NANOBOT_API_KEY: ${NANOBOT_API_KEY:-}
      GOG_KEYRING_PASSWORD: ${GOG_KEYRING_PASSWORD:-}
    entrypoint: ["/usr/local/bin/gateway.sh"]

  nanobot-api:
    image: nanobot:latest
    restart: unless-stopped
    user: "0:0"
    working_dir: /app
    depends_on:
      - pocketbase
      - nanobot
    volumes:
      - nanobot-data:/home/nanobot/.nanobot
    environment:
      HOME: /home/nanobot
      XDG_CONFIG_HOME: /home/nanobot/.nanobot/config
      DASHBOARD_INTERNAL_URL: http://dashboard:3000
      OAUTH_CLI_KIT_TOKEN_PATH: /home/nanobot/.nanobot/auth/github-copilot.json
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      NANOBOT_API_KEY: ${NANOBOT_API_KEY:-}
      GOG_KEYRING_PASSWORD: ${GOG_KEYRING_PASSWORD:-}
    entrypoint: ["/usr/local/bin/api.sh"]

  dashboard:
    image: node:20-slim
    restart: unless-stopped
    depends_on:
      - pocketbase
      - nanobot-api
    volumes:
      - dashboard-build:/app
      - nanobot-data:/data/.nanobot
    environment:
      POCKETBASE_URL: http://pocketbase:8090
      NANOBOT_API_URL: http://nanobot-api:8900
      NEXT_PUBLIC_POCKETBASE_URL: ${NEXT_PUBLIC_POCKETBASE_URL:-http://localhost:8090}
      DASHBOARD_URL: ${DASHBOARD_URL:-http://localhost:3000}
      NANOBOT_API_KEY: ${NANOBOT_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      DASHBOARD_REPO_URL: ${DASHBOARD_REPO_URL:-https://github.com/alisoukarieh/nanobot.git}
      DASHBOARD_REPO_BRANCH: ${DASHBOARD_REPO_BRANCH:-main}
      DASHBOARD_BOOTSTRAP_URL: ${DASHBOARD_BOOTSTRAP_URL:-https://raw.githubusercontent.com/alisoukarieh/nanobot/main/deploy/dashboard.sh}
    entrypoint: ["sh", "-c"]
    command:
      - "apt-get update -qq && apt-get install -y -qq curl > /dev/null 2>&1 && curl -fsSL \"$$DASHBOARD_BOOTSTRAP_URL\" | sh"

volumes:
  pb-data:
  nanobot-data:
  dashboard-build:
