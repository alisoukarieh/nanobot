x-nanobot-build: &nanobot-build
  context: .
  dockerfile: Dockerfile

services:
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    restart: unless-stopped
    volumes:
      - pb-data:/pb_data

  nanobot:
    build: *nanobot-build
    image: nanobot:latest
    restart: unless-stopped
    user: "0:0"
    working_dir: /app
    depends_on:
      - pocketbase
    volumes:
      - nanobot-data:/home/nanobot/.nanobot
    environment:
      HOME: /home/nanobot
      XDG_CONFIG_HOME: /home/nanobot/.nanobot/config
      DASHBOARD_INTERNAL_URL: http://dashboard:3000
      OAUTH_CLI_KIT_TOKEN_PATH: /home/nanobot/.nanobot/auth/github-copilot.json
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      NANOBOT_API_KEY: ${NANOBOT_API_KEY:-}
      GOG_KEYRING_PASSWORD: ${GOG_KEYRING_PASSWORD:-}
    entrypoint: ["/bin/sh", "-c"]
    command: |
      mkdir -p /home/nanobot/.nanobot/logs
      [ -x /home/nanobot/.nanobot/bin/gog ] && ln -sf /home/nanobot/.nanobot/bin/gog /usr/local/bin/gog || true
      nohup nanobot channels login whatsapp > /home/nanobot/.nanobot/logs/whatsapp-bridge.log 2>&1 &
      exec nanobot gateway

  nanobot-api:
    image: nanobot:latest
    restart: unless-stopped
    user: "0:0"
    working_dir: /app
    depends_on:
      - pocketbase
      - nanobot
    volumes:
      - nanobot-data:/home/nanobot/.nanobot
    environment:
      HOME: /home/nanobot
      XDG_CONFIG_HOME: /home/nanobot/.nanobot/config
      DASHBOARD_INTERNAL_URL: http://dashboard:3000
      OAUTH_CLI_KIT_TOKEN_PATH: /home/nanobot/.nanobot/auth/github-copilot.json
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      NANOBOT_API_KEY: ${NANOBOT_API_KEY:-}
      GOG_KEYRING_PASSWORD: ${GOG_KEYRING_PASSWORD:-}
    entrypoint: ["/bin/sh", "-c"]
    command: |
      [ -x /home/nanobot/.nanobot/bin/gog ] && ln -sf /home/nanobot/.nanobot/bin/gog /usr/local/bin/gog || true
      exec nanobot serve --host 0.0.0.0 --verbose

  dashboard:
    image: node:20-slim
    restart: unless-stopped
    depends_on:
      - pocketbase
      - nanobot-api
    volumes:
      - dashboard-build:/app
      - nanobot-data:/data/.nanobot
    environment:
      POCKETBASE_URL: http://pocketbase:8090
      NANOBOT_API_URL: http://nanobot-api:8900
      NEXT_PUBLIC_POCKETBASE_URL: ${NEXT_PUBLIC_POCKETBASE_URL:-http://localhost:8090}
      DASHBOARD_URL: ${DASHBOARD_URL:-http://localhost:3000}
      NANOBOT_API_KEY: ${NANOBOT_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      DASHBOARD_REPO_URL: ${DASHBOARD_REPO_URL:-https://github.com/alisoukarieh/nanobot.git}
      DASHBOARD_REPO_BRANCH: ${DASHBOARD_REPO_BRANCH:-main}
    entrypoint: ["/bin/sh", "-c"]
    command: |
      set -e
      mkdir -p /app
      apt-get update -qq && apt-get install -y -qq git > /dev/null 2>&1
      rm -rf /tmp/repo
      git clone --depth 1 --branch "$$DASHBOARD_REPO_BRANCH" "$$DASHBOARD_REPO_URL" /tmp/repo
      # Additive sync: refresh core files, leave (custom)/ instance dirs untouched
      cp -r /tmp/repo/frontend/. /app/ 2>/dev/null || cp -Rf /tmp/repo/frontend/. /app/
      rm -rf /tmp/repo
      cd /app
      npm install --no-audit --no-fund
      rm -rf .next
      npm run build
      exec npx next start

volumes:
  pb-data:
  nanobot-data:
  dashboard-build:
